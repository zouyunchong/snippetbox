<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnippetBox Privacy Policy</title>
</head>
<body style="font-family: Arial; padding: 40px; max-width: 800px; margin: auto;">
  <h1>Privacy Policy</h1>

  <p>
    SnippetBox does not collect, store, or transmit personal data to external servers.
  </p>

  <p>
    All snippets are stored locally in the user's browser using IndexedDB.
  </p>

  <p>
    The extension does not sell or share user data.
  </p>

  <p>
    Permissions are only used to save user-selected webpage content locally.
  </p>
</body>
</html>
